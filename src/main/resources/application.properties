# =============================================================
# IPF nos Lares - Configuracoes da aplicacao
# =============================================================

# Servidor
server.port=8080

# =============================================================
# Banco de dados MySQL (MySQL Workbench)
# =============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ipfnoslares?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexoes (HikariCP - padrao do Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================================
# JPA / Hibernate
# =============================================================
# validate: valida o schema sem alterar; update: atualiza automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =============================================================
# APIs externas
# =============================================================
# ViaCEP - consulta de CEP (sem autenticacao)
viacep.url=https://viacep.com.br/ws

# Nominatim (OpenStreetMap) - geocodificacao (sem autenticacao)
nominatim.url=https://nominatim.openstreetmap.org/search
nominatim.user-agent=IPFnosLares/1.0

# =============================================================
# Jackson — Serialização/Desserialização via campos (Hungarian notation)
# Garante que Jackson use os CAMPOS diretamente em vez de getters/setters.
# Sem isso, getSCep() seria mapeado para "SCep" pelo JavaBeans Introspector,
# quebrando o contrato de nomes com o front-end Angular.
# Esta config global elimina a dependência de @JsonAutoDetect por classe.
# =============================================================
spring.jackson.visibility.field=any
spring.jackson.visibility.getter=none
spring.jackson.visibility.setter=none
spring.jackson.visibility.is-getter=none

# =============================================================
# Logs
# =============================================================
logging.level.com.ipfnoslares=DEBUG
logging.level.org.springframework.web=INFO
