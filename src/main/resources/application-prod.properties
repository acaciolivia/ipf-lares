# =============================================================
# IPF nos Lares — Configuracoes de PRODUCAO
# =============================================================
# Estas variaveis sao sobrescritas pelas variaveis de ambiente
# do servidor. Nao commite senhas reais aqui.
# =============================================================

# Banco de dados (substituir pelos dados do servidor de producao)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ipfnoslares?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# JPA — nao alterar schema em producao automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Porta (Railway/Render injetam a porta via variavel PORT)
server.port=${PORT:8080}

# Logs — menos verboso em producao
logging.level.com.ipfnoslares=INFO
logging.level.org.springframework.web=WARN
